<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iTerminal - SSH Manager</title>
    <script>
      (function() {
        try {
          var saved = localStorage.getItem('iterminal_theme');
          var theme = 'dark';
          if (saved) {
            var parsed = JSON.parse(saved);
            var mode = parsed.appThemeMode || parsed.appTheme;
            if (mode === 'system') {
              theme = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
            } else if (mode) {
              theme = mode;
            }
          } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
            theme = 'light';
          }
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>
    <style>
      :root, [data-theme='light'] {
        --color-primary: #00b96b;
        --color-bg-base: #ffffff;
        --color-text: rgba(0, 0, 0, 0.88);
        --color-bg-elevated: #ffffff;
      }
      [data-theme='dark'] {
        --color-primary: #00b96b;
        --color-bg-base: #141414;
        --color-text: rgba(255, 255, 255, 0.88);
        --color-bg-elevated: #262626;
      }
      #preloader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--color-bg-base);
        z-index: 99999;
        transition: opacity 0.3s ease-out;
      }
      #preloader.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #preloader-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
      }
      #preloader-logo {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        animation: fadeIn 0.5s ease-out;
      }
      #preloader-title {
        font-size: 24px;
        font-weight: 700;
        color: var(--color-text);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        letter-spacing: -0.5px;
      }
      #preloader-spinner {
        width: 32px;
        height: 32px;
        border: 3px solid var(--color-bg-elevated);
        border-top-color: var(--color-primary);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
      }
    </style>
  </head>
  <body>
    <div id="preloader">
      <div id="preloader-content">
        <div id="preloader-logo">
          <svg viewBox="0 0 64 64" width="64" height="64">
            <rect x="4" y="8" width="56" height="48" rx="4" fill="var(--color-bg-elevated)" stroke="var(--color-primary)" stroke-width="2"/>
            <rect x="4" y="8" width="56" height="12" rx="4" fill="var(--color-primary)" fill-opacity="0.2"/>
            <circle cx="14" cy="14" r="3" fill="#ff5f56"/>
            <circle cx="24" cy="14" r="3" fill="#ffbd2e"/>
            <circle cx="34" cy="14" r="3" fill="#27ca40"/>
            <text x="12" y="36" fill="var(--color-primary)" font-family="monospace" font-size="10">$</text>
            <rect x="22" y="30" width="24" height="2" rx="1" fill="var(--color-primary)" fill-opacity="0.8"/>
            <rect x="12" y="42" width="32" height="2" rx="1" fill="var(--color-text)" fill-opacity="0.3"/>
          </svg>
          <span id="preloader-title">iTerminal</span>
        </div>
        <div id="preloader-spinner"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
